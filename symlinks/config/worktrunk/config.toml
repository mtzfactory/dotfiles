##
# WorkTrunk user configuration
# https://worktrunk.dev/config/

##
# Hooks — apply to all repositories
#

[commit.generation]
# command = "llm -m haiku"
# command = "opencode run -m anthropic/claude-haiku-4.5 --variant fast"
command = "codex exec -m gpt-5.1-codex-mini -c model_reasoning_effort='low' -c system_prompt='' --sandbox=read-only --json - | jq -sr '[.[] | select(.item.type? == \"agent_message\")] | last.item.text'"

[list]
summary = true

[[pre-start]]
sync = "{% if upstream %}git fetch && git rebase {{ upstream }}{% endif %}"

[[pre-start]]
# Copies gitignored files from the primary worktree using .worktreeinclude
# https://github.com/satococoa/git-worktreeinclude
copy = "wt step copy-ignored"

[[pre-start]]
# Install npm dependencies when creating a new worktree
install = "npm install --legacy-peer-deps"

[[post-switch]]
sync = "{% if upstream %}git fetch && git rebase {{ upstream }}{% endif %}"

[[post-switch]]
# Create tmux session with four windows when switching branches
tmux = "$HOME/.config/worktrunk/tmux-session.sh '{{ repo_path | basename | sanitize }}_{{ branch | sanitize }}'"

[post-remove]
# Kill the tmux session when removing the worktree
tmux = "tmux kill-session -t '{{ repo_path | basename | sanitize }}_{{ branch | sanitize }}' 2>/dev/null || true"

