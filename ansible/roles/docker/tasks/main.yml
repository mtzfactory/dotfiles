---
# Role: docker — Docker Engine (repo oficial) + red externa 'web'
#
# La red 'web' es la que comparten los docker-compose.yml independientes
# de cada servicio (PhotoPrism, Kavita, n8n, Ollama…) con el reverse proxy.

- name: Create keyrings directory
  become: true
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  become: true
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  become: true
  apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker packages
  become: true
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Add user to docker group
  become: true
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true

- name: Enable and start Docker service
  become: true
  systemd:
    name: docker
    enabled: true
    state: started

- name: Create external 'web' network for compose services
  become: true
  community.docker.docker_network:
    name: web
    state: present

- name: Install lazydocker
  shell: |
    set -o pipefail
    curl -fsSL https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/bin/lazydocker"
